plugins {
    id 'io.nextflow.nextflow-plugin' version '1.0.0-beta.10'
}

group = 'nextflow'
version = '0.1.0'

nextflowPlugin {
    nextflowVersion = '24.10.0'
    provider = 'biocorecrg'
    className = 'biocorecrg.plugin.LimsPlugin'
    extensionPoints = [
        'biocorecrg.plugin.LimsExtension',
        'biocorecrg.plugin.LimsFactory'
    ]
}

repositories {
    mavenCentral()
    maven { url = uri('https://jitpack.io') }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(23)
    }
}
